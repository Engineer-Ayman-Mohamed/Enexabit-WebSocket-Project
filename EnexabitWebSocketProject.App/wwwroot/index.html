<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Channel Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 12s ease-in-out infinite;
            opacity: 0.08;
        }

        .particle:nth-child(1) {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #7c3aed, transparent);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 14s;
        }
        .particle:nth-child(2) {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #3b82f6, transparent);
            top: 60%;
            right: 8%;
            animation-delay: -3s;
            animation-duration: 18s;
        }
        .particle:nth-child(3) {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #06b6d4, transparent);
            bottom: 15%;
            left: 25%;
            animation-delay: -6s;
            animation-duration: 12s;
        }
        .particle:nth-child(4) {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #a855f7, transparent);
            top: 20%;
            right: 30%;
            animation-delay: -9s;
            animation-duration: 16s;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            min-height: 85vh;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: min-height 0.4s ease;
        }

        .container.login-mode {
            min-height: auto;
        }

        /* HEADER */
        .header {
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .header .user-badge {
            display: none;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .header .user-badge .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .header .user-badge .logout-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 5px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .header .user-badge .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        /* LOGIN FORM */
        .login-section {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 28px;
            flex: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            animation: slideIn 0.5s ease;
        }

        .login-card h2 {
            color: #e2e8f0;
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .login-card .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .login-card .field {
            margin-bottom: 16px;
        }

        .login-card label {
            display: block;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .login-card input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-card input:focus {
            border-color: #7c3aed;
        }

        .login-card input::placeholder {
            color: #475569;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: #f87171;
            font-size: 0.82rem;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        /* CHAT AREA */
        .chat-layout {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .chat-layout.active {
            display: flex;
        }

        /* CHANNEL SIDEBAR */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 12px;
            overflow-y: auto;
        }

        .sidebar .sidebar-label {
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 8px;
            margin-bottom: 12px;
        }

        .channel {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .channel::before {
            content: '#';
            color: #475569;
            font-weight: 400;
        }

        .channel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .channel.active {
            background: rgba(124, 58, 237, 0.15);
            color: #c4b5fd;
        }

        .channel.active::before {
            color: #a78bfa;
        }

        .channel .unread-dot {
            display: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7c3aed;
            margin-left: auto;
            flex-shrink: 0;
        }

        .channel .unread-dot.show {
            display: block;
        }

        /* MAIN CHAT */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header .channel-name {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header .channel-name .hash {
            color: #475569;
        }

        .chat-header .status-badge {
            font-size: 0.75rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header .status-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .chat-header .status-badge .dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .msg {
            animation: fadeIn 0.25s ease;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.15s;
            max-width: 85%;
        }

        .msg:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .msg .msg-user {
            font-weight: 600;
            font-size: 0.82rem;
            margin-right: 6px;
        }

        .msg .msg-text {
            color: #cbd5e1;
            font-size: 0.92rem;
            word-break: break-word;
            line-height: 1.45;
        }

        .msg .msg-time {
            font-size: 0.65rem;
            color: #475569;
            margin-left: 8px;
            float: right;
            margin-top: 3px;
        }

        .msg.system {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            font-style: italic;
            max-width: 100%;
            padding: 4px 12px;
            animation: fadeIn 0.35s ease;
        }

        .msg.system .system-icon {
            margin-right: 6px;
            font-style: normal;
        }

        .msg.empty-state {
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            padding: 40px 12px;
            max-width: 100%;
        }

        /* INPUT */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: flex-end;
        }

        .input-area .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-area input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #7c3aed;
        }

        .input-area input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .input-area input::placeholder {
            color: #475569;
        }

        .send-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* TYPING INDICATOR */
        .typing {
            padding: 0 24px 12px;
            font-size: 0.78rem;
            color: #64748b;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .typing .typing-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .typing .typing-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #64748b;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .typing .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
                border: none;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding: 12px 16px;
                display: flex;
                gap: 8px;
                overflow-x: auto;
                flex-shrink: 0;
            }

            .sidebar .sidebar-label {
                display: none;
            }

            .channel {
                white-space: nowrap;
                flex-shrink: 0;
                margin-bottom: 0;
                padding: 8px 14px;
                font-size: 0.82rem;
            }

            .chat-layout.active {
                flex-direction: column;
            }

            .header {
                padding: 14px 18px;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .chat-header {
                padding: 12px 16px;
            }

            .messages {
                padding: 12px 14px;
            }

            .input-area {
                padding: 12px 14px;
            }

            .login-card {
                padding: 28px 24px;
            }

            .msg {
                max-width: 95%;
            }

            .send-btn {
                padding: 12px 18px;
            }
        }

        @media (max-width: 480px) {
            .login-section {
                padding: 40px 16px;
            }

            .login-card {
                padding: 24px 18px;
            }

            .login-card h2 {
                font-size: 1.25rem;
            }

            .header .user-badge .logout-btn {
                padding: 4px 10px;
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
<!-- Background particles -->
<div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container login-mode" id="appContainer">
    <!-- HEADER -->
    <div class="header">
        <h1>✦ Channel Chat</h1>
        <div class="user-badge" id="userBadge">
            <div class="avatar" id="userAvatar">U</div>
            <span id="userDisplayName"></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div class="login-section" id="loginSection">
        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to join the conversation</p>
            <div class="field">
                <label>Username</label>
                <input id="usernameInput" type="text" placeholder="Enter your username" autocomplete="username" />
            </div>
            <div class="field">
                <label>Password</label>
                <input id="passwordInput" type="password" placeholder="Enter your password" autocomplete="current-password" />
            </div>
            <button class="login-btn" id="loginBtn">Sign In</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-layout" id="chatLayout">
        <div class="sidebar" id="sidebar"></div>
        <div class="main">
            <div class="chat-header">
                <div class="channel-name">
                    <span class="hash">#</span>
                    <span id="currentChannelName">Select a channel</span>
                </div>
                <div class="status-badge">
                    <span class="dot" id="statusDot"></span>
                    <span id="statusText">Connected</span>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="typing" id="typingIndicator">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <span id="typingText"></span>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input id="messageInput" type="text" placeholder="Type a message..." disabled />
                </div>
                <button class="send-btn" id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script>
    const CHANNELS = [
        { id: 1, name: 'general' },
        { id: 2, name: 'random' },
        { id: 3, name: 'tech' },
        { id: 4, name: 'support' },
        { id: 5, name: 'off-topic' }
    ];

    const COLORS = ['#a78bfa', '#60a5fa', '#34d399', '#fbbf24', '#f472b6', '#fb923c', '#22d3ee', '#e879f9'];

    let currentChannel = null;
    let connection = null;
    let accessToken = null;
    let userName = '';
    let displayName = '';

    // DOM refs
    const container = document.getElementById('appContainer');
    const loginSection = document.getElementById('loginSection');
    const chatLayout = document.getElementById('chatLayout');
    const userBadge = document.getElementById('userBadge');
    const userAvatar = document.getElementById('userAvatar');
    const userDisplayName = document.getElementById('userDisplayName');

    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    const sidebar = document.getElementById('sidebar');
    const messages = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const currentChannelName = document.getElementById('currentChannelName');
    const typingIndicator = document.getElementById('typingIndicator');
    const typingText = document.getElementById('typingText');

    // --- Login ---
    function doLogin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username || !password) return;

        loginError.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
            .then(res => {
                if (!res.ok) throw new Error('Invalid credentials');
                return res.json();
            })
            .then(data => {
                accessToken = data.accessToken;
                userName = username;
                displayName = data.displayName;
                onLoginSuccess();
            })
            .catch(err => {
                loginError.textContent = err.message || 'Login failed';
            })
            .finally(() => {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            });
    }

    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function onLoginSuccess() {
        loginSection.style.display = 'none';
        chatLayout.classList.add('active');
        userBadge.style.display = 'flex';
        userAvatar.textContent = displayName.charAt(0).toUpperCase();
        userDisplayName.textContent = displayName;
        container.classList.remove('login-mode');

        connectSignalR();
    }

    // --- Logout ---
    document.getElementById('logoutBtn').addEventListener('click', () => {
        if (connection) {
            connection.stop();
            connection = null;
        }
        fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken }
        }).catch(() => {});

        accessToken = null;
        currentChannel = null;
        userBadge.style.display = 'none';
        chatLayout.classList.remove('active');
        loginSection.style.display = 'flex';
        container.classList.add('login-mode');
        messages.innerHTML = '';
        document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
        currentChannelName.textContent = 'Select a channel';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Disconnected';
    });

    // --- SignalR ---
    function connectSignalR() {
        connection = new signalR.HubConnectionBuilder()
            .withUrl('/channelHub?access_token=' + accessToken)
            .withAutomaticReconnect()
            .build();

        connection.on('JoinedChannel', msgs => {
            messages.innerHTML = '';
            msgs.forEach(m => appendMessage(m, false));
            if (msgs.length === 0) {
                const p = document.createElement('div');
                p.className = 'msg empty-state';
                p.textContent = 'No messages yet — start the conversation!';
                messages.appendChild(p);
            }
            statusDot.className = 'dot';
            const ch = CHANNELS.find(c => c.id === currentChannel);
            statusText.textContent = '# ' + (ch ? ch.name : '');
        });

        connection.on('NewMessage', msg => appendMessage(msg, true));

        connection.on('UserJoined', name => {
            const p = document.createElement('div');
            p.className = 'msg system';
            p.innerHTML = `<span class="system-icon">➜</span> ${name} joined`;
            messages.appendChild(p);
            messages.scrollTop = messages.scrollHeight;
        });

        connection.on('UserLeft', name => {
            const p = document.createElement('div');
            p.className = 'msg system';
            p.innerHTML = `<span class="system-icon">✕</span> ${name} left`;
            messages.appendChild(p);
            messages.scrollTop = messages.scrollHeight;
        });

        connection.on('Error', err => {
            const p = document.createElement('div');
            p.className = 'msg system';
            p.style.color = '#f87171';
            p.textContent = '⚠ ' + err;
            messages.appendChild(p);
            messages.scrollTop = messages.scrollHeight;
        });

        connection.onreconnecting(() => {
            statusDot.className = 'dot disconnected';
            statusText.textContent = 'Reconnecting...';
        });

        connection.onreconnected(() => {
            statusDot.className = 'dot';
            statusText.textContent = 'Connected';
            if (currentChannel) joinChannel(currentChannel);
        });

        connection.onclose(() => {
            statusDot.className = 'dot disconnected';
            statusText.textContent = 'Disconnected';
        });

        connection.start()
            .then(() => {
                statusDot.className = 'dot';
                statusText.textContent = 'Connected';
                // auto-select first channel
                joinChannel(CHANNELS[0].id);
            })
            .catch(err => {
                statusDot.className = 'dot disconnected';
                statusText.textContent = 'Connection failed';
            });
    }

    // --- Messages ---
    function getUserColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return COLORS[Math.abs(hash) % COLORS.length];
    }

    function formatTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(msg, scroll) {
        const empty = messages.querySelector('.empty-state');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = 'msg';

        const color = getUserColor(msg.userName);
        const time = formatTime(msg.createdAt);

        div.innerHTML = `
                <span class="msg-user" style="color:${color}">${msg.userName}</span>
                <span class="msg-time">${time}</span>
                <div class="msg-text">${msg.text}</div>
            `;

        messages.appendChild(div);
        if (scroll) messages.scrollTop = messages.scrollHeight;
    }

    // --- Channels ---
    function buildSidebar() {
        CHANNELS.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel';
            div.dataset.id = ch.id;
            div.textContent = ch.name;

            const dot = document.createElement('span');
            dot.className = 'unread-dot';
            div.appendChild(dot);

            div.addEventListener('click', () => joinChannel(ch.id));
            sidebar.appendChild(div);
        });
    }
    buildSidebar();

    function joinChannel(channelId) {
        currentChannel = channelId;
        const ch = CHANNELS.find(c => c.id === channelId);
        if (ch) currentChannelName.textContent = ch.name;

        document.querySelectorAll('.channel').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.id) === channelId);
            const dot = el.querySelector('.unread-dot');
            if (dot) dot.classList.remove('show');
        });

        if (connection && connection.state === signalR.HubConnectionState.Connected) {
            connection.invoke('JoinChannel', channelId).catch(() => {});
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        } else {
            messageInput.disabled = true;
            sendBtn.disabled = true;
        }
    }

    // --- Send ---
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentChannel) return;

        connection.invoke('SendMessage', currentChannel, text)
            .then(() => { messageInput.value = ''; })
            .catch(err => {
                const p = document.createElement('div');
                p.className = 'msg system';
                p.style.color = '#f87171';
                p.textContent = '⚠ Send failed: ' + err;
                messages.appendChild(p);
                messages.scrollTop = messages.scrollHeight;
            });
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
