name: Deploy to MonsterASP.NET

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EnexabitWebSocketProject.App/EnexabitWebSocketProject.App.csproj

      - name: Build
        run: dotnet build EnexabitWebSocketProject.App/EnexabitWebSocketProject.App.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish EnexabitWebSocketProject.App/EnexabitWebSocketProject.App.csproj --configuration Release --output publish

      - name: Deploy via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}